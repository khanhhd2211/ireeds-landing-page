version: "3.9"

services:
  db:
    image: postgres:16        # whichever tag you need
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo_user    # superuser created by the image
      POSTGRES_PASSWORD: secret   # change for real use
      # optionally POSTGRES_DB: demo  (the default DB for the user)
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  pgdata: